services:
  insona-admin:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database across container restarts
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - GATEWAY_IP=${GATEWAY_IP}
      - GATEWAY_PORT=${GATEWAY_PORT}
      - LOG_PATH=/app/data/logs/energy.log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Run Prisma migrations before starting the app
    command: >
      sh -c "./node_modules/.bin/prisma migrate deploy --schema ./prisma/schema.prisma && node server.js"
