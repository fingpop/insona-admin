# 生产环境 docker-compose — 从 Docker Registry 拉取镜像
# 使用方式:
#   docker compose -f docker-compose.prod.yml up -d
# 更新镜像:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:
  insona-admin:
    image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com/insona}/insona-admin:${TAG:-latest}
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database across container restarts
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - GATEWAY_IP=${GATEWAY_IP}
      - GATEWAY_PORT=${GATEWAY_PORT}
      - LOG_PATH=/app/data/logs/energy.log
    # Allow GATEWAY_IP=host.docker.internal to reach services running on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Run Prisma migrations before starting the app
    command: >
      sh -c "( ./node_modules/.bin/prisma migrate deploy --schema ./prisma/schema.prisma || ./node_modules/.bin/prisma db push --schema ./prisma/schema.prisma ) && node server.js"
