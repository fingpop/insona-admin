<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业照明管理系统 - SmartLight Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f1419;
            color: #e1e8ed;
            overflow-x: hidden;
        }

        /* 侧边栏样式 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            background: linear-gradient(180deg, #1a1f2e 0%, #151a28 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        /* 收缩状态下隐藏滚动条 */
        .sidebar.collapsed .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar:not(.collapsed) {
            width: 260px;
        }

        .sidebar.collapsed .sidebar-text {
            display: none;
        }

        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 12px;
        }

        /* 侧边栏内容容器 */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 20px;
        }

        /* 自定义滚动条样式 */
        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 侧边栏头部固定 */
        .sidebar-header {
            flex-shrink: 0;
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 侧边栏底部用户区域 */
        .sidebar-footer {
            flex-shrink: 0;
            padding: 20px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        /* 主内容区域 */
        .main-content {
            margin-left: 260px;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
            background: #0f1419;
        }

        .main-content.expanded {
            margin-left: 70px;
        }

        /* 卡片样式 */
        .card {
            background: linear-gradient(145deg, #1a1f2e 0%, #151a28 100%);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.2);
        }

        /* 统计卡片 */
        .stat-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e1e8ed;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 输入框样式 */
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: #e1e8ed;
            width: 100%;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* 滑块样式 */
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
        }

        .slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: none;
        }

        /* 抽屉样式 */
        .drawer {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1f2e 0%, #151a28 100%);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.5);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            overflow-y: auto;
        }

        .drawer.open {
            right: 0;
        }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1999;
        }

        .drawer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead {
            background: rgba(255, 255, 255, 0.05);
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table tbody tr {
            transition: all 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* 标签样式 */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .badge-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .badge-error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* 导航菜单项 */
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin: 4px 12px;
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
        }

        .nav-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .nav-item i {
            width: 24px;
            font-size: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        /* 标签页样式 */
        .tab-button {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .tab-button:hover {
            color: #60a5fa;
        }

        .tab-button.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a1f2e 0%, #151a28 100%);
            border-radius: 12px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 图表容器 */
        .chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* 语言切换下拉菜单 */
        .lang-dropdown {
            position: relative;
        }

        .lang-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: linear-gradient(145deg, #1a1f2e 0%, #151a28 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            min-width: 160px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .lang-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .lang-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .lang-menu-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }

        .lang-menu-item.active {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .lang-menu-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        /* 设备状态指示器 */
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-online {
            background: #4ade80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
        }

        .status-offline {
            background: #64748b;
        }

        .status-warning {
            background: #fbbf24;
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
        }

        /* 颜色选择器 */
        .color-picker {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            cursor: crosshair;
            position: relative;
            background: linear-gradient(to right,
                    rgb(255, 0, 0),
                    rgb(255, 255, 0),
                    rgb(0, 255, 0),
                    rgb(0, 255, 255),
                    rgb(0, 0, 255),
                    rgb(255, 0, 255),
                    rgb(255, 0, 0));
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar:not(.collapsed) {
                width: 100%;
            }

            .main-content {
                margin-left: 0;
            }

            .drawer {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>

    <script>
        // ==================== 全局状态管理 ====================
        const AppState = {
            currentPage: 'dashboard',
            sidebarCollapsed: false,
            devices: [],
            projects: [],
            scenes: [],
            schedules: [],
            automations: []
        };

        // ==================== 工具函数 ====================
        function showNotification(message, type = 'info') {
            console.log(`[${type.toUpperCase()}] ${message}`);
            // 实际项目中可以使用 toast 库
        }

        function formatDate(date) {
            return new Date(date).toLocaleString('zh-CN');

        let energyChartInstance = null;

        // 生成模拟数据
        function generateEnergyData(days) {
            const data = [];
            const labels = [];
            const now = new Date();

            for (let i = days - 1; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);

                if (days <= 7) {
                    labels.push(`${date.getMonth() + 1}/${date.getDate()}`);
                } else if (days <= 30) {
                    if (i % 2 === 0) labels.push(`${date.getMonth() + 1}/${date.getDate()}`);
                    else labels.push('');
                } else {
                    if (i % 7 === 0) labels.push(`${date.getMonth() + 1}/${date.getDate()}`);
                    else labels.push('');
                }

                // 生成模拟能耗数据（基础值 + 随机波动）
                const baseValue = 2800;
                const randomFactor = Math.random() * 800 - 400;
                const weekdayFactor = (date.getDay() >= 1 && date.getDay() <= 5) ? 400 : -200;
                data.push(Math.round(baseValue + randomFactor + weekdayFactor));
            }

            return { labels, data };
        }

        // 处理编辑场景
        window.handleEditScene = function (event, sceneId) {
            event.preventDefault();

            const name = document.getElementById('editSceneName').value;
            const locationId = document.getElementById('editSceneLocation').value;
            const brightness = document.getElementById('editSceneBrightness').value;
            const colorTemp = document.getElementById('editSceneColorTemp').value;

            // 查找并更新场景数据
            const sceneIndex = scenesData.findIndex(s => s.id === sceneId);
            if (sceneIndex !== -1) {
                scenesData[sceneIndex].name = name;
                scenesData[sceneIndex].locationId = locationId;
                scenesData[sceneIndex].location = document.getElementById('editSceneLocation').selectedOptions[0].text;
                scenesData[sceneIndex].brightness = parseInt(brightness);
                scenesData[sceneIndex].colorTemp = parseInt(colorTemp);
            }

            showNotification(`场景 "${name}" 修改成功！`, 'success');
            closeModal();
            filterScenes(); // 重新加载场景列表
        };

        // 删除场景
        window.deleteScene = function (sceneId) {
            const scene = scenesData.find(s => s.id === sceneId);
            if (!scene) {
                showNotification('场景不存在', 'error');
                return;
            }

            if (confirm(`确定要删除场景 "${scene.name}" 吗？`)) {
                const index = scenesData.findIndex(s => s.id === sceneId);
                if (index !== -1) {
                    scenesData.splice(index, 1);
                }
                showNotification(`场景 "${scene.name}" 已删除`, 'success');
                filterScenes(); // 重新加载场景列表
            }
        };

        // ==================== 语言切换功能 ====================
        const langToggle = document.getElementById('langToggle');
        const langMenu = document.getElementById('langMenu');
        const currentLangSpan = document.getElementById('currentLang');
        let currentLanguage = 'zh-CN';

        // 语言配置
        const languages = {
            'zh-CN': '简体中文',
            'en-US': 'English',
            'ja-JP': '日本語'
        };

        // 切换语言菜单显示
        if (langToggle && langMenu) {
            langToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                langMenu.classList.toggle('active');
            });

            // 点击外部关闭菜单
            document.addEventListener('click', () => {
                langMenu.classList.remove('active');
            });

            langMenu.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            // 选择语言
            document.querySelectorAll('.lang-menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    const lang = item.dataset.lang;
                    if (lang === currentLanguage) return;

                    currentLanguage = lang;
                    currentLangSpan.textContent = languages[lang];

                    // 更新选中状态
                    document.querySelectorAll('.lang-menu-item').forEach(menuItem => {
                        menuItem.classList.remove('active');
                        const checkIcon = menuItem.querySelector('i.fa-check');
                        const circleIcon = menuItem.querySelector('i.fa-circle');
                        if (checkIcon) checkIcon.style.opacity = '0';
                        if (circleIcon) circleIcon.style.opacity = '0';
                    });

                    item.classList.add('active');
                    const selectedIcon = item.querySelector('i');
                    if (selectedIcon) {
                        selectedIcon.className = 'fas fa-check';
                        selectedIcon.style.opacity = '1';
                    }

                    langMenu.classList.remove('active');

                    // 显示切换提示
                    showNotification(`语言已切换为 ${languages[lang]}`, 'success');

                    // 这里可以添加实际的语言切换逻辑
                    // switchLanguage(lang);
                });
            });
        }
