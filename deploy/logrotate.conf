# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/insona-admin
# Test: sudo logrotate -d /etc/logrotate.d/insona-admin

/opt/insona-admin/data/logs/energy.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}
